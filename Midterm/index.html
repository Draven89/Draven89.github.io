<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Archive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body>

    <header class="top-nav">
        <div class="brand-container" onclick="fetchRandomAnime()">
            <div class="home-btn">ANIME ARCHIVE</div>
        </div>

        <div class="nav-right">
            <div class="search-group">
                <input type="text" id="userInput" placeholder="Search Anime (e.g. Bleach)...">
                <button onclick="fetchAnimeData()">Search</button>
            </div>
            <div class="nav-link" onclick="fetchTopSeries()" style="cursor: pointer">Top Anime Series</div>
            <div class="nav-link" onclick="fetchTopMovies()" style="cursor: pointer">Top Anime Movies</div>
        </div>
    </header>

    <div id="profile-box">
        <div class="close-btn" onclick="closeProfile()">×</div>
        <div id="profile-content"></div>
    </div>

    <main class="wrapper">
        <div class="content-box">
            <div class="clan-nav">
                <span class="clan-label">FILTER TYPE</span>
                <select id="typeFilter" onchange="fetchAnimeData(this.value)">
                    <option value="">All Types</option>
                    <option value="tv">TV Series</option>
                    <option value="movie">Movie</option>
                    <option value="ova">OVA</option>
                    <option value="special">Special</option>
                </select>
            </div>

            <div id="results-grid">
                <div class="placeholder-text">Search for an anime to begin data extraction.</div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = "https://api.jikan.moe/v4/anime";
        const EXCLUDE_GENRES = "12,49";

      function isAdultContent(anime) {
    if (!anime) return true;


    const rating = anime.rating ? anime.rating.toLowerCase() : "";
    if (rating.includes('rx') || rating.includes('hentai') || rating.includes('x-rated')) return true;


    const adultGenreIds = [12, 49]; 
    const hasAdultGenre = anime.genres && anime.genres.some(g => adultGenreIds.includes(g.mal_id));
    if (hasAdultGenre) return true;

    const adultKeywords = ['hentai', 'uncensored', 'erotica', 'sex', 'porn'];
    const title = anime.title ? anime.title.toLowerCase() : "";
    const synopsis = anime.synopsis ? anime.synopsis.toLowerCase() : "";
    
    if (adultKeywords.some(word => title.includes(word) || synopsis.includes(word))) return true;

    return false;
}

        async function fetchAnimeData(typeValue = null) {
            const query = document.getElementById('userInput').value.trim();
            const filterType = typeValue || document.getElementById('typeFilter').value;
            const grid = document.getElementById('results-grid');

            if (!query && !typeValue) return;

            grid.innerHTML = "<p class='status-msg'>Accessing Global Database...</p>";

            try {
                let url = `${API_BASE}?q=${encodeURIComponent(query)}&sfw=true&genres_exclude=${EXCLUDE_GENRES}`;
                if (filterType) url += `&type=${filterType}`;

                const res = await fetch(url);
                const json = await res.json();

                renderGrid(json.data || []);
            } catch (err) {
                grid.innerHTML = `<p class='status-msg' style="color:var(--hollow-crimson)">Database Error: Connection Interrupted.</p>`;
            }
        }

        function renderGrid(animeList) {
            const grid = document.getElementById('results-grid');
            grid.innerHTML = "";

            const safeList = animeList.filter(anime => !isAdultContent(anime));

            if (safeList.length === 0) {
                grid.innerHTML = "<p class='status-msg'>No safe matches found in this sector.</p>";
                return;
            }

            safeList.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openProfile(anime);

                card.innerHTML = `
                    <img src="${anime.images.jpg.image_url}" alt="${anime.title}">
                    <div class="card-info">
                        <div class="card-race">${anime.type} • ${anime.score || 'N/A'} ★</div>
                        <div class="card-name">${anime.title}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function fetchTopSeries() {
            const grid = document.getElementById('results-grid');
            const TOP_SERIES_API = "https://api.jikan.moe/v4/top/anime?type=tv&sfw=true";

            document.getElementById('userInput').value = "";
            grid.innerHTML = "<p class='status-msg'>Accessing High-Ranked Series...</p>";

            try {
                const res = await fetch(TOP_SERIES_API);
                const json = await res.json();
                renderGrid(json.data || []);
            } catch (err) {
                grid.innerHTML = `<p class='status-msg' style="color:var(--hollow-crimson)">Error: Could not retrieve series rankings.</p>`;
            }
        }

        async function fetchTopMovies() {
            const grid = document.getElementById('results-grid');
            const TOP_MOVIES_API = "https://api.jikan.moe/v4/top/anime?type=movie&sfw=true";

            document.getElementById('userInput').value = "";
            grid.innerHTML = "<p class='status-msg'>Accessing High-Ranked Movies...</p>";

            try {
                const res = await fetch(TOP_MOVIES_API);
                const json = await res.json();
                renderGrid(json.data || []);
            } catch (err) {
                grid.innerHTML = `<p class='status-msg' style="color:var(--hollow-crimson)">Error: Could not retrieve movie rankings.</p>`;
            }
        }

        async function fetchRandomAnime() {
            const grid = document.getElementById('results-grid');
            const RANDOM_API = "https://api.jikan.moe/v4/random/anime";

            document.getElementById('userInput').value = "";
            grid.innerHTML = "";

            const totalToLoad = 55;
            const batchSize = 5;
            let currentCount = 0;

            try {
                while (currentCount < totalToLoad) {
                    let batch = [];

                    for (let i = 0; i < batchSize; i++) {
                        const res = await fetch(RANDOM_API);

                        if (res.status === 429) {
                            await new Promise(r => setTimeout(r, 1500));
                            i--;
                            continue;
                        }

                        const json = await res.json();
                        const anime = json.data;

                        if (anime && !isAdultContent(anime)) {
                            batch.push(anime);
                            currentCount++;
                        } else {
                            i--;
                        }

                        await new Promise(r => setTimeout(r, 400));
                    }

                    appendToGrid(batch);

                    if (currentCount < totalToLoad) {
                        await new Promise(r => setTimeout(r, 800));
                    }
                }
            } catch (err) {
                console.error("Batch load failed:", err);
            }
        }

        function appendToGrid(animeList) {
            const grid = document.getElementById('results-grid');

            animeList.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openProfile(anime);

                card.innerHTML = `
                    <img src="${anime.images.jpg.image_url}" alt="${anime.title}">
                    <div class="card-info">
                        <div class="card-race">${anime.type} • ${anime.score || 'N/A'} ★</div>
                        <div class="card-name">${anime.title}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openProfile(anime) {
            const box = document.getElementById('profile-box');
            const content = document.getElementById('profile-content');

            content.innerHTML = `
                <img src="${anime.images.jpg.large_image_url}" class="profile-img">
                <div class="profile-title">${anime.title}</div>
                <div class="profile-kanji">${anime.title_japanese || ''}</div>
                <div class="stat-row"><span class="stat-label">Episodes</span><span>${anime.episodes || '??'}</span></div>
                <div class="stat-row"><span class="stat-label">Status</span><span>${anime.status}</span></div>
                <div class="stat-row"><span class="stat-label">Rating</span><span>${anime.rating || 'Unrated'}</span></div>
                <p class="profile-desc">${anime.synopsis || 'No synopsis available.'}</p>
                <div style="margin-top: 20px;">
                    <a href="${anime.url}" target="_blank" style="color: #4a90e2; text-decoration: none; font-weight: bold;">View on MyAnimeList →</a>
                </div>
            `;
            box.classList.add('active');
        }

        function closeProfile() {
            document.getElementById('profile-box').classList.remove('active');
        }

        window.onload = fetchRandomAnime;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</body>

</html>
